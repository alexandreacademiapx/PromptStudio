<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0;width:1200px;height:630px;overflow:hidden;background:#020104}
body{font-family:"JetBrains Mono",monospace;color:#f8f4ff}
.card{position:relative;width:1200px;height:630px;overflow:hidden;background:#040207}
.aura{position:absolute;inset:0;background:radial-gradient(ellipse 47% 84% at 50% 52%,rgba(105,48,191,.58) 0,rgba(67,24,112,.28) 34%,rgba(17,7,28,.54) 63%,transparent 82%)}
.light{position:absolute;left:50%;top:50%;width:700px;height:700px;border-radius:50%;transform:translate(-50%,-48%);background:radial-gradient(circle,rgba(147,91,255,.15),transparent 68%);filter:blur(2px)}
.grain{position:absolute;inset:0;opacity:.22;background-image:radial-gradient(rgba(255,255,255,.18) .55px,transparent .65px);background-size:6px 6px;mix-blend-mode:soft-light}
.frame{position:absolute;inset:24px;border:1px solid rgba(205,174,255,.14);border-radius:34px}
.halo{position:absolute;left:50%;top:51%;width:550px;height:550px;transform:translate(-50%,-50%);border:1px solid rgba(201,165,255,.18);border-radius:50%}
.halo:before,.halo:after{content:"";position:absolute;border:1px solid rgba(201,165,255,.11);border-radius:50%;inset:48px}
.halo:after{inset:104px;border-color:rgba(201,165,255,.07)}
.axis-x,.axis-y{position:absolute;left:50%;top:50%;background:linear-gradient(90deg,transparent,rgba(191,153,255,.25),transparent)}
.axis-x{width:680px;height:1px;transform:translate(-50%,-50%) rotate(-28deg)}
.axis-y{width:1px;height:520px;transform:translate(-50%,-50%) rotate(-28deg);background:linear-gradient(180deg,transparent,rgba(191,153,255,.18),transparent)}
.brand{position:absolute;z-index:2;left:50%;top:54px;transform:translateX(-50%);margin:0;font-size:39px;line-height:1;letter-spacing:10px;font-weight:500;white-space:nowrap;text-shadow:0 0 24px rgba(164,107,255,.28)}
.brand strong{font-weight:700;color:#d2bdff}
.mark{position:absolute;z-index:1;left:50%;top:-26px;width:760px;height:760px;transform:translateX(-50%) rotate(-4deg);object-fit:contain;filter:drop-shadow(0 38px 54px rgba(0,0,0,.72)) drop-shadow(0 0 58px rgba(132,65,238,.64))}
.tag{position:absolute;z-index:2;left:50%;bottom:46px;transform:translateX(-50%);font-size:12px;letter-spacing:3px;color:#a991c2;white-space:nowrap}
</style>
</head>
<body>
<main class="card">
  <div class="aura"></div><div class="light"></div><div class="grain"></div><div class="frame"></div>
  <div class="halo"></div><div class="axis-x"></div><div class="axis-y"></div>
  <h1 class="brand">PROMPT <strong>STUDIO</strong></h1>
  <img class="mark" src="media/entry-liquid-alpha.webp" alt="">
  <div class="tag">DIRE&Ccedil;&Atilde;O CRIATIVA PARA IA</div>
</main>
</body>
</html>
